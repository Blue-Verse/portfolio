    function createEl(tag, attrs, children) {
        const el = document.createElement(tag);
        if (attrs) {
            Object.entries(attrs).forEach(([k, v]) => {
                if (k === 'className') el.className = v;
                else if (k === 'textContent') el.textContent = v;
                else if (k.startsWith('data')) el.setAttribute(k.replace(/([A-Z])/g, '-$1').toLowerCase(), v);
                else el.setAttribute(k, v);
            });
        }
        if (children) {
            (Array.isArray(children) ? children : [children]).forEach(c => {
                if (typeof c === 'string') el.appendChild(document.createTextNode(c));
                else if (c) el.appendChild(c);
            });
        }
        return el;
    }

    function budgetToNumber(str) {
        let n = 0;
        const raw = str.replace(/,/g, '');
        const eok = raw.match(/([\d.]+)\s*억/);
        const man = raw.match(/([\d.]+)\s*만/);
        if (eok) n += parseFloat(eok[1]) * 100000000;
        if (man) n += parseFloat(man[1]) * 10000;
        return n;
    }

    function formatKRW(n) {
        const eok = Math.floor(n / 100000000);
        const man = Math.round((n % 100000000) / 10000);
        let s = '';
        if (eok > 0) s += eok + '억 ';
        if (man > 0) s += man.toLocaleString() + '만';
        return s.trim() + '원';
    }

        svg.setAttribute('stroke-linecap', 'round');
        svg.setAttribute('stroke-linejoin', 'round');
        ['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z',
         'M14 2 14 8 20 8', 'M16 13 8 13', 'M16 17 8 17', 'M10 9 9 9 8 9'].forEach(d => {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d.includes(' ') && !d.includes('M') ? '' : d);
            if (d.includes(' ') && !d.startsWith('M')) {
                const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                polyline.setAttribute('points', d);
                svg.appendChild(polyline);
            } else {
                path.setAttribute('d', d);
                svg.appendChild(path);
            }
        });
        countEl.appendChild(svg);
        countEl.appendChild(document.createTextNode(PROPOSALS.length + '건'));

        PROPOSALS.forEach((p, i) => {
            const card = createEl('article', { className: 'proposal-card', 'data-reveal': '', style: 'transition-delay: ' + (i * 60) + 'ms' });

            // Header
            const header = createEl('div', { className: 'proposal-card-header' }, [
                createEl('h3', { textContent: p.title }),
                createEl('span', { className: 'proposal-date', textContent: p.date })
            ]);
            card.appendChild(header);

            // Meta pills
            const meta = createEl('div', { className: 'proposal-meta' }, [
                createEl('span', { className: 'proposal-pill pill-budget', textContent: p.budget }),
                createEl('span', { className: 'proposal-pill pill-duration', textContent: p.duration }),
                createEl('span', { className: 'proposal-pill pill-category', textContent: p.category })
            ]);
            card.appendChild(meta);

            // Description
            card.appendChild(createEl('p', { className: 'proposal-desc', textContent: p.description }));

            // Tech tags
            const techRow = createEl('div', { className: 'proposal-tech' });
            p.tech.forEach(t => techRow.appendChild(createEl('span', { className: 'tech-tag', textContent: t })));
            card.appendChild(techRow);

            // Action buttons
            const actions = createEl('div', { className: 'proposal-actions' });
            const viewBtn = createEl('a', {
                className: 'button button-primary',
                href: 'https://blue-verse.github.io/' + p.slug + '/',
                target: '_blank',
                rel: 'noopener',
                textContent: '제안서 보기'
            });
            actions.appendChild(viewBtn);
            card.appendChild(actions);

            grid.appendChild(card);
        });
    }

    // Reveal animation
    document.documentElement.classList.add('js-ready');
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.08 });

    renderProposals();
    document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));

    // Mobile menu toggle
    const toggle = document.querySelector('[data-menu-toggle]');
    const nav = document.getElementById('site-nav');
    if (toggle && nav) {
        toggle.addEventListener('click', () => {
            const open = nav.classList.toggle('is-open');
            toggle.setAttribute('aria-expanded', String(open));
            document.body.classList.toggle('has-open-menu', open);
        });
    }

    // Active nav
    document.querySelectorAll('[data-nav-page]').forEach(a => {
        if (a.dataset.navPage === document.body.dataset.page) a.classList.add('is-active');
    });
    </script>
</body>
</html>
